<!DOCTYPE html>
<html>
	<head>
		<title>STATUS | SPACE CLOCK</title>
		
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />

		<meta http-equiv="refresh" content="60" />

		<link rel="stylesheet" href="/css/styles.css" />
	</head>
	<body>
		<h1>
			<span class="name">SPACE CLOCK</span>
			<br/>
			<span>STATUS</span>
		</h1>

		<section id="display">
			<h2>Display</h2>
			<time datetime="{TIMESTAMP_LOCAL}">{TIME_DISPLAY}</time>
		</section>
		<section id="time">
			<h2>Time</h2>
			<time id="realtime">--:--:--</time>
		</section>

		<section id="status">
			<h2>Status</h2>
			<dl>
				<dt>Satellites</dt>
				<dd>{SATELLITES}</dd>
	
				<dt>Time UTC</dt>
				<dd>{TIMESTAMP_UTC}</dd>
				<dt>Time Local</dt>
				<dd>{TIMESTAMP_LOCAL}</dd>
	
				<dt>Latitude</dt>
				<dd>{LAT}</dd>
				<dt>Longitude</dt>
				<dd>{LON}</dd>
				<dt>Altitude</dt>
				<dd>{ALTITUDE}</dd>
				<dt>Height</dt>
				<dd>{HEIGHT}</dd>
			</dl>
		</section>
		
		<section id="options">
			<h2>Options</h2>
			<ul>
				<li>
					<a class="btn" href="/config">Config</a>
				</li>
			</ul>
		</section>

		<script type="text/javascript">
			const localTime = new Date("{TIMESTAMP_LOCAL}");
			const startTime = new Date().getTime();
			
			const realtime = document.getElementById("realtime");

			// Tick the clock every second
			setInterval(() => {
				if (localTime.getFullYear() === 1970) {
					return;
				}
				delta = new Date() - startTime;
				currentTime = new Date(localTime.getTime() + delta);

				realtime.textContent = currentTime.toLocaleTimeString();
				realtime.setAttribute("datetime", currentTime.toISOString());
			}, 1000);
		</script>
	</body>
</html>
