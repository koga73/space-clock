<!DOCTYPE html>
<html>
	<head>
		<title>{TITLE}</title>

		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />

		<style>
			* {
				margin:0;
				border:0;
				padding:0;
				font-size:1rem;
				line-height:1em;
			}

			html, body {
				width:100%;
				height:100%;
			}
			body {
				font-family:Arial, Helvetica, sans-serif;
				box-sizing:border-box;
				padding:32px;
				background:#f0f0f0;
				color:#101010
			}
			
			h1 {
				margin-bottom:24px;
				font-size:2em;
			}
			label {
				font-size:0.875em;
			}
			select, input {
				box-sizing:border-box;
				padding:8px;
				width:100%;
				margin-top:4px;
				border:1px solid #ccc;
				border-radius:3px;
			}
			button {
				appearance:none;
				padding:8px 12px;
				background:#0080FF;
				color:#f0f0f0;
				border-radius:3px;
				cursor:pointer;
				margin:8px 0;
				text-transform: uppercase;
			}
			
			.grp {
				margin:16px 0;
			}
		</style>
	</head>
	<body>
		<h1>{TITLE}</h1>

		<form action="http://{IP_ADDRESS}/connect" method="POST">
			<div class="grp">
				<label for="sltWifi">Network:</label>
				<select id="sltWifi" name="ssid" required>
					<option value="" disabled selected>-- select a network --</option>
					{WIFI_OPTIONS}
				</select>
			</div>

			<div class="grp">
				<label for="txtPass">Password:</label>
				<input id="txtPass" type="text" name="password" minlength="8"/>
			</div>

			<button type="submit">Connect</button>
		</form>
	</body>
</html>
